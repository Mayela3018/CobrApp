version: "3.8"

services:
  n8n:
    image: n8nio/n8n
    container_name: cobrapp-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin123
      - GENERIC_TIMEZONE=America/Lima
      - TZ=America/Lima
      - WEBHOOK_URL=https://embattled-mousy-donated.ngrok-free.dev/
      - N8N_EDITOR_BASE_URL=https://embattled-mousy-donated.ngrok-free.dev/
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - python-api

  python-api:
    build: ./python-api
    container_name: cobrapp-api
    ports:
      - "8000:8000"
    volumes:
      - ./python-api:/app

volumes:
  n8n_data: